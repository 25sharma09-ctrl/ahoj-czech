<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CzechLearn A2 — Full Course</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g0:#eafbf2;--g1:#9fe1cb;--g2:#1D9E75;--g3:#0F6E56;--g4:#085041;
  --a0:#FAEEDA;--a2:#BA7517;
  --b0:#E6F1FB;--b2:#185FA5;--b3:#0C447C;
  --r0:#FCEBEB;--r2:#A32D2D;
  --p0:#EEEDFE;--p2:#534AB7;
  --bg:#f7f6f2;--surf:#ffffff;
  --bdr:#e4e3de;--bdr2:#cccbc5;
  --txt:#18180f;--mut:#6b6961;--fnt:#9e9c95;
  --rad:10px;--rads:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;line-height:1.65}
.shell{max-width:800px;margin:0 auto;padding:1.5rem 1rem 5rem}
.screen{display:none}.screen.active{display:block}

/* topbar */
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:1.75rem;flex-wrap:wrap}
.brand{font-size:19px;font-weight:800;letter-spacing:-.03em;color:var(--txt);flex:1}
.brand span{color:var(--g2)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:99px}
.bg{background:var(--g0);color:var(--g3)}
.ba{background:var(--a0);color:var(--a2)}
.bb{background:var(--b0);color:var(--b2)}
.bp{background:var(--p0);color:var(--p2)}
.btn-back{display:inline-flex;align-items:center;gap:5px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rads);padding:6px 12px;font-size:13px;color:var(--mut);cursor:pointer;font-family:inherit}
.btn-back:hover{border-color:var(--bdr2);color:var(--txt)}

/* metrics */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.metric{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rad);padding:14px 10px;text-align:center}
.metric-val{font-size:22px;font-weight:800;color:var(--txt)}
.metric-lbl{font-size:10px;color:var(--fnt);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}

/* heatmap */
.hmap-wrap{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rad);padding:1.25rem;margin-bottom:1.5rem}
.sec-label{font-size:11px;font-weight:700;color:var(--fnt);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.hmap-grid{display:grid;grid-template-columns:repeat(52,1fr);gap:3px}
.hmap-col{display:flex;flex-direction:column;gap:3px}
.hmap-cell{width:100%;aspect-ratio:1;border-radius:2px;background:#ebebeb}
.hmap-cell.l1{background:var(--g0)}.hmap-cell.l2{background:var(--g1)}.hmap-cell.l3{background:var(--g2)}.hmap-cell.l4{background:var(--g3)}
.hmap-leg{display:flex;align-items:center;gap:4px;margin-top:8px;font-size:11px;color:var(--fnt);justify-content:flex-end}
.leg-cell{width:11px;height:11px;border-radius:2px}

/* unit grid */
.units{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
.unit-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rad);padding:1.1rem 1.2rem;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.unit-card:hover:not(.locked){border-color:var(--g2);box-shadow:0 0 0 3px var(--g0)}
.unit-card.locked{opacity:.4;cursor:not-allowed}
.unit-num{font-size:10px;font-weight:700;color:var(--fnt);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.unit-emoji{font-size:22px;margin-bottom:4px}
.unit-title{font-size:14px;font-weight:700;margin-bottom:4px}
.unit-desc{font-size:12px;color:var(--mut);margin-bottom:10px;line-height:1.5}
.prog-bar{height:4px;background:#ebebeb;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--g2);border-radius:2px;transition:width .4s}
.unit-meta{font-size:11px;color:var(--fnt);margin-top:5px}

/* lesson list */
.lessons{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}
.les-row{display:flex;align-items:center;gap:12px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rads);padding:12px 14px;cursor:pointer;transition:border-color .15s}
.les-row:hover:not(.locked){border-color:var(--g2)}
.les-row.locked{opacity:.4;cursor:not-allowed}
.les-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.li-done{background:var(--g0);color:var(--g3)}.li-todo{background:#f0efe9;color:var(--mut)}.li-lock{background:#f0efe9;color:var(--fnt)}
.les-info{flex:1}.les-title{font-size:13px;font-weight:600}.les-sub{font-size:11px;color:var(--fnt);margin-top:1px}
.les-type{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:6px}
.lt-read{background:var(--b0);color:var(--b2)}.lt-listen{background:var(--p0);color:var(--p2)}.lt-gram{background:var(--a0);color:var(--a2)}.lt-quiz{background:var(--g0);color:var(--g3)}
.les-xp{font-size:12px;font-weight:600;color:var(--g3)}

/* tip box */
.tip-box{background:var(--b0);color:var(--b3);border-radius:var(--rads);padding:11px 14px;font-size:13px;line-height:1.6;margin-bottom:1.2rem}

/* word grid */
.word-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.4rem}
.word-card{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--rads);padding:10px 12px}
.word-cz{font-size:15px;font-weight:700}.word-en{font-size:12px;color:var(--mut);margin-top:1px}
.word-pron{font-size:11px;color:var(--fnt);font-style:italic;margin-top:1px}

/* ── READING LESSON ── */
.lesson-wrap{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rad);overflow:hidden;margin-bottom:1rem}
.lesson-hero{background:linear-gradient(135deg,var(--g3),var(--g2));color:#fff;padding:1.25rem 1.5rem}
.lesson-hero h2{font-size:18px;font-weight:700;margin-bottom:4px}
.lesson-hero p{font-size:13px;opacity:.85}
.lesson-body{padding:1.25rem 1.5rem}
.reading-text{font-size:15px;line-height:1.9;color:var(--txt);margin-bottom:1.25rem}
.reading-text .cz-word{border-bottom:1.5px dashed var(--g2);cursor:help;color:var(--g3);font-weight:500;position:relative}
.translation-toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--mut);margin-bottom:1rem}
.translation-toggle input[type=checkbox]{accent-color:var(--g2);width:15px;height:15px;cursor:pointer}
.translation-block{background:var(--bg);border-left:3px solid var(--g2);border-radius:0 var(--rads) var(--rads) 0;padding:12px 14px;font-size:14px;line-height:1.8;color:var(--mut);margin-bottom:1rem;display:none}
.translation-block.show{display:block}
.vocab-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:1rem}
.vocab-table th{text-align:left;padding:8px 10px;background:var(--bg);color:var(--fnt);font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;border-bottom:1px solid var(--bdr)}
.vocab-table td{padding:9px 10px;border-bottom:1px solid var(--bdr)}
.vocab-table tr:last-child td{border-bottom:none}
.cz-cell{font-weight:600;color:var(--g3)}
.ex-cell{font-size:12px;color:var(--mut);font-style:italic}

/* ── LISTENING LESSON ── */
.listen-card{background:var(--p0);border:1px solid #d4d1f5;border-radius:var(--rad);padding:1.25rem;margin-bottom:1rem}
.listen-title{font-size:13px;font-weight:700;color:var(--p2);margin-bottom:10px}
.listen-player{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.play-btn{width:44px;height:44px;border-radius:50%;background:var(--p2);color:#fff;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.play-btn:hover{background:#3d33a0}
.listen-text-cz{font-size:16px;font-weight:600;color:var(--p2);line-height:1.7;margin-bottom:6px}
.listen-text-en{font-size:13px;color:var(--mut);line-height:1.6;display:none}
.listen-text-en.show{display:block}
.show-trans-btn{font-size:12px;color:var(--p2);background:none;border:1px solid var(--p2);border-radius:99px;padding:3px 10px;cursor:pointer;font-family:inherit;margin-top:4px}
.dialog-row{display:flex;gap:10px;margin-bottom:10px}
.dialog-avatar{width:32px;height:32px;border-radius:50%;background:var(--p2);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.dialog-avatar.b{background:var(--g3)}
.dialog-bubble{background:var(--surf);border:1px solid var(--bdr);border-radius:0 var(--rad) var(--rad) var(--rad);padding:10px 13px;flex:1}
.dialog-bubble.right{border-radius:var(--rad) 0 var(--rad) var(--rad);background:var(--g0);border-color:#b5ddd0}
.dialog-cz{font-size:14px;font-weight:500;margin-bottom:2px}
.dialog-en{font-size:12px;color:var(--mut);font-style:italic}
.speak-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--p2);background:none;border:1px solid #c4c0f0;border-radius:99px;padding:3px 9px;cursor:pointer;margin-top:5px;font-family:inherit}
.speak-btn:hover{background:#f0effe}

/* ── GRAMMAR LESSON ── */
.gram-section{margin-bottom:1.25rem}
.gram-title{font-size:14px;font-weight:700;color:var(--a2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.gram-rule{background:var(--a0);border-left:3px solid var(--a2);border-radius:0 var(--rads) var(--rads) 0;padding:11px 14px;font-size:13px;line-height:1.7;margin-bottom:8px}
.gram-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:10px}
.gram-table th{background:var(--a0);color:var(--a2);padding:7px 10px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #f0c97c}
.gram-table td{padding:8px 10px;border-bottom:1px solid var(--bdr)}
.gram-table tr:last-child td{border-bottom:none}
.gram-table .hi{font-weight:700;color:var(--g3)}
.gram-examples{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.gram-ex{display:flex;gap:10px;font-size:13px}
.gram-ex .cz{font-weight:600;color:var(--txt);min-width:180px}
.gram-ex .en{color:var(--mut);font-style:italic}

/* ── FILL IN BLANK ── */
.fib-wrap{margin-bottom:1rem}
.fib-q{font-size:15px;line-height:2;margin-bottom:8px}
.fib-input{border:none;border-bottom:2px solid var(--g2);background:transparent;font-size:15px;font-family:inherit;padding:0 4px;width:110px;color:var(--txt);outline:none}
.fib-input:focus{border-bottom-color:var(--p2)}
.fib-input.correct{border-bottom-color:var(--g2);color:var(--g3)}
.fib-input.wrong{border-bottom-color:var(--r2);color:var(--r2)}
.fib-hint{font-size:12px;color:var(--fnt);margin-bottom:12px}

/* ── QUIZ ── */
.quiz-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rad);padding:1.25rem;margin-bottom:1rem}
.qprog-bar{height:3px;background:#ebebeb;border-radius:2px;margin-bottom:1rem}
.qprog-fill{height:100%;background:var(--g2);border-radius:2px;transition:width .3s}
.quiz-label{font-size:11px;color:var(--fnt);margin-bottom:8px}
.quiz-q{font-size:16px;font-weight:600;margin-bottom:1rem;line-height:1.5}
.options{display:flex;flex-direction:column;gap:8px}
.opt{padding:11px 15px;border:1px solid var(--bdr2);border-radius:var(--rads);cursor:pointer;font-size:14px;background:var(--surf);text-align:left;font-family:inherit;transition:border-color .12s,background .12s}
.opt:hover:not(:disabled){border-color:var(--g2);background:var(--g0)}
.opt.correct{background:var(--g0);border-color:var(--g2);color:var(--g4);font-weight:600}
.opt.wrong{background:var(--r0);border-color:var(--r2);color:var(--r2)}
.opt:disabled{cursor:default}
.feedback{border-radius:var(--rads);padding:10px 14px;font-size:13px;margin-top:10px;line-height:1.6}
.fb-good{background:var(--g0);color:var(--g4)}.fb-bad{background:var(--r0);color:var(--r2)}

/* ── RESULT ── */
.result-wrap{text-align:center;padding:2rem 0 1.5rem}
.res-stars{font-size:28px;margin-bottom:6px}
.res-score{font-size:52px;font-weight:800;color:var(--g2);letter-spacing:-.04em}
.res-sub{font-size:14px;color:var(--mut);margin-top:4px;margin-bottom:1.5rem}
.ai-box{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--rads);padding:14px;font-size:13px;line-height:1.7;color:var(--txt);min-height:56px;margin-bottom:1.5rem;text-align:left}
.ai-loading{color:var(--fnt);font-style:italic}

/* ── BUTTONS ── */
.btn-primary{width:100%;background:var(--g2);color:#fff;border:none;border-radius:var(--rads);padding:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-primary:hover{background:var(--g3)}
.btn-ghost{width:100%;background:none;border:1px solid var(--bdr2);border-radius:var(--rads);padding:11px;font-size:14px;cursor:pointer;color:var(--mut);font-family:inherit;margin-top:8px;transition:border-color .15s}
.btn-ghost:hover{color:var(--txt);border-color:var(--bdr2)}
.btn-check{background:var(--g2);color:#fff;border:none;border-radius:var(--rads);padding:9px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}
.btn-check:hover{background:var(--g3)}
.btn-next{background:var(--g2);color:#fff;border:none;border-radius:var(--rads);padding:9px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:none}
.btn-next:hover{background:var(--g3)}

h2{font-size:17px;font-weight:700;margin-bottom:10px}
.divider{height:1px;background:var(--bdr);margin:1.25rem 0}

@media(max-width:560px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  .units{grid-template-columns:1fr}
  .word-grid{grid-template-columns:repeat(2,1fr)}
  .hmap-grid{grid-template-columns:repeat(26,1fr)}
  .gram-ex{flex-direction:column;gap:2px}
}
</style>
</head>
<body>
<div class="shell">

<!-- DASHBOARD -->
<div class="screen active" id="s-dash">
  <div class="topbar">
    <div class="brand">Czech<span>Learn</span> <span style="font-size:12px;font-weight:400;color:var(--fnt)">A2</span></div>
    <span class="badge ba" id="d-streak">🔥 0 days</span>
    <span class="badge bg" id="d-xp">⭐ 0 XP</span>
  </div>
  <div class="metrics">
    <div class="metric"><div class="metric-val" id="m-xp">0</div><div class="metric-lbl">Total XP</div></div>
    <div class="metric"><div class="metric-val" id="m-les">0</div><div class="metric-lbl">Lessons done</div></div>
    <div class="metric"><div class="metric-val" id="m-wds">0</div><div class="metric-lbl">Words learned</div></div>
    <div class="metric"><div class="metric-val" id="m-acc">—</div><div class="metric-lbl">Quiz accuracy</div></div>
  </div>
  <div class="hmap-wrap">
    <div class="sec-label">Daily activity — last 12 months</div>
    <div class="hmap-grid" id="heatmap"></div>
    <div class="hmap-leg">Less <div class="leg-cell" style="background:#ebebeb"></div><div class="leg-cell" style="background:var(--g0)"></div><div class="leg-cell" style="background:var(--g1)"></div><div class="leg-cell" style="background:var(--g2)"></div><div class="leg-cell" style="background:var(--g3)"></div> More</div>
  </div>
  <h2>A2 Course units</h2>
  <div class="units" id="units-grid"></div>
</div>

<!-- UNIT -->
<div class="screen" id="s-unit">
  <div class="topbar">
    <button class="btn-back" onclick="goTo('s-dash')">← Dashboard</button>
    <div style="flex:1;font-size:16px;font-weight:700" id="unit-hdr"></div>
  </div>
  <div class="tip-box" id="unit-tip"></div>
  <div class="sec-label">Key vocabulary</div>
  <div class="word-grid" id="word-grid"></div>
  <h2>Lessons</h2>
  <div class="lessons" id="les-list"></div>
</div>

<!-- LESSON RUNNER -->
<div class="screen" id="s-lesson">
  <div class="topbar">
    <button class="btn-back" id="les-back">← Unit</button>
    <div style="flex:1;font-size:15px;font-weight:700" id="les-hdr"></div>
    <span class="badge bg" id="les-xp"></span>
  </div>
  <div id="lesson-content"></div>
  <div style="display:flex;gap:8px;margin-top:4px">
    <button class="btn-check" id="btn-check" style="display:none" onclick="checkFIB()">Check answers</button>
    <button class="btn-next" id="btn-next" onclick="nextStep()">Continue →</button>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="s-result">
  <div class="topbar"><div class="brand">Czech<span>Learn</span></div></div>
  <div class="result-wrap">
    <div class="res-stars" id="res-stars"></div>
    <div class="res-score" id="res-score"></div>
    <div class="res-sub" id="res-sub"></div>
  </div>
  <div class="ai-box" id="res-ai"><span class="ai-loading">Getting personalised feedback…</span></div>
  <button class="btn-primary" id="res-next">Continue</button>
  <button class="btn-ghost" onclick="goTo('s-dash')">Back to dashboard</button>
</div>

</div><!-- /shell -->
<script>
// ═══════════════════════════════════════════════════════════
// COURSE DATA  (A2 level — 4 units, multi-lesson-type each)
// ═══════════════════════════════════════════════════════════
const COURSE = [
{
  id:'u1',title:'Daily Routines',emoji:'☀️',
  desc:'Talk about your day, times, and everyday activities.',
  tip:'Czech verbs change their ending depending on the subject. The infinitive usually ends in -t or -at. We will focus on the present tense for common verbs.',
  words:[
    ['vstávat','to get up','VSTA-vat'],['snídat','to have breakfast','SNEE-dat'],
    ['pracovat','to work','PRA-tso-vat'],['obědvat','to have lunch','O-byed-vat'],
    ['večeřet','to have dinner','VE-che-rzhet'],['spát','to sleep','spaat'],
    ['ráno','morning','RAA-no'],['večer','evening','VE-cher'],
    ['každý den','every day','KAZH-dee den'],['brzy','early','BR-zi'],
  ],
  lessons:[
    {
      id:'u1l1',title:'A day in Prague',type:'read',xp:30,
      data:{
        intro:'Read this short diary entry from Tomáš, a 28-year-old graphic designer living in Prague. Hover over underlined words to see their meaning.',
        czechText:`Jmenuji se Tomáš. Každý den <span class="cz-word" title="I get up">vstávám</span> v šest hodin ráno. Nejdřív <span class="cz-word" title="I take a shower">se sprchu</span> a pak <span class="cz-word" title="I have breakfast">snídám</span> — obvykle chleba s máslem a kávu. V osm hodin <span class="cz-word" title="I go">jdu</span> do práce metrem. <span class="cz-word" title="I work">Pracuji</span> jako grafik v centru Prahy. V poledne <span class="cz-word" title="I have lunch">obědvám</span> v restauraci nebo nosím jídlo z domu. Odpoledne <span class="cz-word" title="I have meetings">mám schůzky</span>. Večer se <span class="cz-word" title="I return">vracím</span> domů kolem šesti. <span class="cz-word" title="I cook">Vařím</span> nebo si objednám jídlo. Ve deset <span class="cz-word" title="I go to sleep">jdu spát</span>.`,
        translation:`My name is Tomáš. Every day I get up at six in the morning. First I take a shower and then I have breakfast — usually bread with butter and coffee. At eight I go to work by metro. I work as a graphic designer in the centre of Prague. At noon I have lunch in a restaurant or I bring food from home. In the afternoon I have meetings. In the evening I return home around six. I cook or I order food. At ten I go to sleep.`,
        vocab:[
          {cz:'vstávám',en:'I get up',ex:'Vstávám v šest. — I get up at six.'},
          {cz:'snídám',en:'I have breakfast',ex:'Co snídáš? — What do you have for breakfast?'},
          {cz:'pracuji',en:'I work',ex:'Pracuji v bance. — I work in a bank.'},
          {cz:'obědvám',en:'I have lunch',ex:'Obědvám ve dvě. — I have lunch at two.'},
          {cz:'vařím',en:'I cook',ex:'Vařím každý den. — I cook every day.'},
          {cz:'jdu spát',en:'I go to sleep',ex:'Jdu spát v jedenáct. — I go to sleep at eleven.'},
        ]
      }
    },
    {
      id:'u1l2',title:'Telling the time',type:'listen',xp:25,
      data:{
        intro:'Listen to these dialogues about time and daily schedule. Press the speaker button to hear each sentence read aloud.',
        dialogs:[
          {speaker:'A',name:'Jana',cz:'Kolik je hodin?',en:'What time is it?'},
          {speaker:'B',name:'Marek',cz:'Je půl deváté.',en:'It\'s half past eight.'},
          {speaker:'A',name:'Jana',cz:'Kdy vstáváš?',en:'When do you get up?'},

// STATE

const SK='czlearn_a2_v2';
let S={xp:0,streak:0,lastDate:null,done:{},totalQ:0,correctQ:0,daily:{}};
let curUnit=null,curLesson=null,lessonStep=0,qScore=0,qTotal=0;

function load(){try{const r=localStorage.getItem(SK);if(r)S=JSON.parse(r);}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}
function goTo(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

// ═══════════════════════════════════════════════════════════
// HEATMAP
// ═══════════════════════════════════════════════════════════
function buildHeatmap(){
  const el=document.getElementById('heatmap');el.innerHTML='';
  const today=new Date();const start=new Date(today);start.setDate(start.getDate()-363);
  for(let col=0;col<52;col++){
    const ce=document.createElement('div');ce.className='hmap-col';
    for(let row=0;row<7;row++){
      const d=new Date(start);d.setDate(d.getDate()+col*7+row);
      const cell=document.createElement('div');
      if(d>today){ce.appendChild(cell);continue;}
      const key=d.toISOString().slice(0,10);
      const n=S.daily[key]||0;
      cell.className='hmap-cell'+(n>=6?' l4':n>=4?' l3':n>=2?' l2':n>=1?' l1':'');
      cell.title=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+': '+n+' lesson'+(n!==1?'s':'')+' done';
      ce.appendChild(cell);
    }
    el.appendChild(ce);
  }
}

// ═══════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════
function renderDash(){
  const doneLes=Object.keys(S.done).length;
  document.getElementById('m-xp').textContent=S.xp;
  document.getElementById('m-les').textContent=doneLes;
  document.getElementById('m-wds').textContent=Math.min(doneLes*3,COURSE.reduce((a,u)=>a+u.words.length,0));
  document.getElementById('m-acc').textContent=S.totalQ?Math.round(S.correctQ/S.totalQ*100)+'%':'—';
  document.getElementById('d-streak').textContent='🔥 '+S.streak+' day'+(S.streak!==1?'s':'');
  document.getElementById('d-xp').textContent='⭐ '+S.xp+' XP';
  buildHeatmap();
  const grid=document.getElementById('units-grid');grid.innerHTML='';
  COURSE.forEach((u,ui)=>{
    const total=u.lessons.length,done=u.lessons.filter(l=>S.done[l.id]).length;
    const locked=ui>0&&!COURSE[ui-1].lessons.every(l=>S.done[l.id]);
    const card=document.createElement('div');
    card.className='unit-card'+(locked?' locked':'');
    card.innerHTML=`<div class="unit-num">Unit ${ui+1}${locked?' 🔒':''}</div><div class="unit-emoji">${u.emoji}</div><div class="unit-title">${u.title}</div><div class="unit-desc">${u.desc}</div><div class="prog-bar"><div class="prog-fill" style="width:${total?Math.round(done/total*100):0}%"></div></div><div class="unit-meta">${done}/${total} lessons · ${u.words.length} words</div>`;
    if(!locked)card.onclick=()=>openUnit(u);
    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════════
// UNIT
// ═══════════════════════════════════════════════════════════
function openUnit(u){
  curUnit=u;
  document.getElementById('unit-hdr').textContent=u.emoji+' '+u.title;
  document.getElementById('unit-tip').innerHTML='💡 <strong>Grammar tip:</strong> '+u.tip;
  const wg=document.getElementById('word-grid');
  wg.innerHTML=u.words.map(([cz,en,pron])=>`<div class="word-card"><div class="word-cz">${cz}</div><div class="word-en">${en}</div>${pron?`<div class="word-pron">${pron}</div>`:''}</div>`).join('');
  const ll=document.getElementById('les-list');ll.innerHTML='';
  const typeLabel={read:'Reading',listen:'Listening',grammar:'Grammar',fib:'Practice',quiz:'Quiz'};
  const typeClass={read:'lt-read',listen:'lt-listen',grammar:'lt-gram',fib:'lt-quiz',quiz:'lt-quiz'};
  u.lessons.forEach((l,li)=>{
    const done=!!S.done[l.id];
    const locked=li>0&&!S.done[u.lessons[li-1].id];
    const row=document.createElement('div');
    row.className='les-row'+(locked?' locked':'');
    row.innerHTML=`<div class="les-icon ${done?'li-done':locked?'li-lock':'li-todo'}">${done?'✓':locked?'🔒':'▶'}</div><div class="les-info"><div class="les-title">${l.title}<span class="les-type ${typeClass[l.type]}">${typeLabel[l.type]}</span></div><div class="les-sub">${l.type==='quiz'?l.data.qs.length+' questions':l.type==='fib'?l.data.items.length+' exercises':l.type==='listen'?l.data.dialogs.length+' dialogues':'Reading + vocabulary'}</div></div><span class="les-xp">+${l.xp} XP</span>`;
    if(!locked)row.onclick=()=>startLesson(l);
    ll.appendChild(row);
  });
  document.getElementById('les-back').onclick=()=>goTo('s-unit');
  goTo('s-unit');
}

// ═══════════════════════════════════════════════════════════
// LESSON RUNNER
// ═══════════════════════════════════════════════════════════
function startLesson(l){
  curLesson=l;lessonStep=0;qScore=0;qTotal=0;
  document.getElementById('les-hdr').textContent=l.title;
  document.getElementById('les-xp').textContent='⭐ '+l.xp+' XP';
  renderStep();
  goTo('s-lesson');
}

function renderStep(){
  const lc=document.getElementById('lesson-content');
  const bc=document.getElementById('btn-check');
  const bn=document.getElementById('btn-next');
  bc.style.display='none';bn.style.display='none';
  const l=curLesson;

  if(l.type==='read') renderRead(lc,l,bn);
  else if(l.type==='listen') renderListen(lc,l,bn);
  else if(l.type==='grammar') renderGrammar(lc,l,bn);
  else if(l.type==='fib') renderFIB(lc,l,bc,bn);
  else if(l.type==='quiz') renderQuizStep(lc,l);
}

// ── READING ─────────────────────────────────────────────
function renderRead(lc,l,bn){
  const d=l.data;
  lc.innerHTML=`
    <div class="lesson-wrap">
      <div class="lesson-hero"><h2>📖 ${l.title}</h2><p>${d.intro}</p></div>
      <div class="lesson-body">
        <div class="reading-text">${d.czechText.replace(/\n/g,'<br>')}</div>
        <label class="translation-toggle"><input type="checkbox" onchange="document.getElementById('trans').classList.toggle('show',this.checked)"> Show English translation</label>
        <div class="translation-block" id="trans">${d.translation.replace(/\n/g,'<br>')}</div>
        <div class="divider"></div>
        <div class="sec-label">Vocabulary from this text</div>
        <table class="vocab-table">
          <thead><tr><th>Czech</th><th>English</th><th>Example</th></tr></thead>
          <tbody>${d.vocab.map(v=>`<tr><td class="cz-cell">${v.cz}</td><td>${v.en}</td><td class="ex-cell">${v.ex}</td></tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;
  bn.style.display='inline-flex';bn.textContent='I\'ve read this →';bn.onclick=()=>finishLesson();
}

// ── LISTENING ───────────────────────────────────────────
function renderListen(lc,l,bn){
  const d=l.data;
  const dialHtml=d.dialogs.map((dia,i)=>`
    <div class="dialog-row" style="${dia.speaker==='B'?'flex-direction:row-reverse':''}">
      <div class="dialog-avatar ${dia.speaker==='B'?'b':''}">${dia.name.slice(0,2).toUpperCase()}</div>
      <div class="dialog-bubble ${dia.speaker==='B'?'right':''}">
        <div class="dialog-cz">${dia.cz}</div>
        <div class="dialog-en" id="den-${i}">${dia.en}</div>
        <button class="speak-btn" onclick="speakCzech('${dia.cz.replace(/'/g,"\\'")}')">🔊 Listen</button>
        <button class="show-trans-btn" onclick="document.getElementById('den-${i}').classList.toggle('show')">Show translation</button>
      </div>
    </div>`).join('');
  const notesHtml=d.notes.map(n=>`<li style="font-size:13px;margin-bottom:5px;color:var(--mut)">${n}</li>`).join('');
  lc.innerHTML=`
    <div class="lesson-wrap">
      <div class="lesson-hero" style="background:linear-gradient(135deg,var(--p2),#7F77DD)"><h2>🎧 ${l.title}</h2><p>${d.intro}</p></div>
      <div class="lesson-body">
        <div class="listen-card">
          <div class="listen-title">💬 Dialogue — click 🔊 to hear each line</div>
          ${dialHtml}
        </div>
        <div class="divider"></div>
        <div class="sec-label">Language notes</div>
        <ul style="padding-left:16px">${notesHtml}</ul>
      </div>
    </div>`;
  bn.style.display='inline-flex';bn.textContent='Done listening →';bn.onclick=()=>finishLesson();
}

function speakCzech(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='cs-CZ';u.rate=0.85;
  window.speechSynthesis.speak(u);
}

// ── GRAMMAR ─────────────────────────────────────────────
function renderGrammar(lc,l,bn){
  const d=l.data;
  const secHtml=d.sections.map(s=>`
    <div class="gram-section">
      <div class="gram-title">📐 ${s.title}</div>
      <div class="gram-rule">${s.rule}</div>
      <table class="gram-table">
        <thead><tr>${s.table.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${s.table.rows.map((r,ri)=>`<tr>${r.map((c,ci)=>`<td class="${s.table.highlight.includes(ri)&&ci===0?'hi':''}">${c}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
      <div class="sec-label" style="margin-top:10px">Examples</div>
      <div class="gram-examples">${s.examples.map(e=>`<div class="gram-ex"><span class="cz">${e.cz}</span><span class="en">${e.en}</span></div>`).join('')}</div>
    </div>`).join('<div class="divider"></div>');
  lc.innerHTML=`<div class="lesson-wrap"><div class="lesson-hero" style="background:linear-gradient(135deg,#854F0B,var(--a2))"><h2>📐 ${l.title}</h2><p>Study the grammar rules and examples below.</p></div><div class="lesson-body">${secHtml}</div></div>`;
  bn.style.display='inline-flex';bn.textContent='Got it →';bn.onclick=()=>finishLesson();

// ── FILL IN BLANK ───────────────────────────────────────
function renderFIB(lc,l,bc,bn){
  const d=l.data;
  const itemsHtml=d.items.map((it,i)=>`
    <div class="fib-wrap">
      <div class="fib-q">${it.before}<input class="fib-input" id="fib-${i}" placeholder="?" autocomplete="off" spellcheck="false">${it.after}</div>
      <div class="fib-hint" id="fibh-${i}">Hint: ${it.hint}</div>
    </div>`).join('');
  lc.innerHTML=`<div class="lesson-wrap"><div class="lesson-hero" style="background:linear-gradient(135deg,var(--g3),var(--g2))"><h2>✏️ ${l.title}</h2><p>${d.instruction}</p></div><div class="lesson-body">${itemsHtml}</div></div>`;
  bc.style.display='inline-flex';
}

function checkFIB(){
  const items=curLesson.data.items;
  let correct=0;
  items.forEach((it,i)=>{
    const inp=document.getElementById('fib-'+i);
    const val=inp.value.trim().toLowerCase();
    const ans=it.answer.toLowerCase();
    if(val===ans){inp.classList.add('correct');inp.classList.remove('wrong');correct++;}
    else{inp.classList.add('wrong');inp.classList.remove('correct');inp.placeholder=it.answer;}
  });
  qScore=correct;qTotal=items.length;
  S.totalQ+=items.length;S.correctQ+=correct;
  document.getElementById('btn-check').style.display='none';
  const bn=document.getElementById('btn-next');
  bn.style.display='inline-flex';bn.textContent=`${correct}/${items.length} correct — Continue →`;
  bn.onclick=()=>finishLesson();
}

function nextStep(){ finishLesson(); }

// ── QUIZ ────────────────────────────────────────────────
let curQIdx=0;
function renderQuizStep(lc,l){
  const qs=l.data.qs;
  if(curQIdx>=qs.length){finishLesson();return;}
  const q=qs[curQIdx];
  const pct=Math.round(curQIdx/qs.length*100);
  lc.innerHTML=`
    <div class="quiz-card">
      <div class="qprog-bar"><div class="qprog-fill" style="width:${pct}%"></div></div>
      <div class="quiz-label">Question ${curQIdx+1} of ${qs.length}</div>
      <div class="quiz-q">${q.q}</div>
      <div class="options">${q.opts.map((o,i)=>`<button class="opt" onclick="pickAns(${i})">${o}</button>`).join('')}</div>
      <div id="qfb"></div>
    </div>`;
}

function pickAns(idx){
  const q=curLesson.data.qs[curQIdx];
  const opts=document.querySelectorAll('.opt');
  opts.forEach(o=>o.disabled=true);
  const ok=idx===q.ans;
  opts[idx].classList.add(ok?'correct':'wrong');
  if(!ok)opts[q.ans].classList.add('correct');
  document.getElementById('qfb').innerHTML=`<div class="feedback ${ok?'fb-good':'fb-bad'}">${ok?'✓ Correct! ':'✗ Not quite. '}${q.hint}</div>`;
  S.totalQ++;if(ok){S.correctQ++;qScore++;}
  qTotal=curLesson.data.qs.length;
  curQIdx++;
  setTimeout(()=>{renderQuizStep(document.getElementById('lesson-content'),curLesson);},1800);
}

// ═══════════════════════════════════════════════════════════
// FINISH LESSON
// ═══════════════════════════════════════════════════════════
async function finishLesson(){
  const l=curLesson;
  const isQuiz=(l.type==='quiz');
  const isFib=(l.type==='fib');
  const hasScore=isQuiz||isFib;
  const pct=hasScore&&qTotal?Math.round(qScore/qTotal*100):100;
  const xpEarned=pct>=66?l.xp:Math.round(l.xp*pct/100);

  if(!S.done[l.id]){
    S.done[l.id]=1;S.xp+=xpEarned;
    const today=new Date().toISOString().slice(0,10);
    if(S.lastDate!==today){S.streak++;S.lastDate=today;}
    S.daily[today]=(S.daily[today]||0)+1;
  }
  save();

  const stars=pct===100?'⭐⭐⭐':pct>=66?'⭐⭐':pct>=33?'⭐':'';
  document.getElementById('res-stars').textContent=stars;
  document.getElementById('res-score').textContent=hasScore?qScore+'/'+qTotal:'✓ Done';
  document.getElementById('res-sub').textContent=`+${xpEarned} XP earned${hasScore?' · '+pct+'% correct':''}`;

  const lesIdx=curUnit.lessons.indexOf(l);
  const nextL=curUnit.lessons[lesIdx+1];
  const nextU=COURSE[COURSE.indexOf(curUnit)+1];
  const btn=document.getElementById('res-next');
  if(nextL){btn.textContent='Next lesson →';btn.onclick=()=>{curQIdx=0;startLesson(nextL);};}
  else if(nextU){btn.textContent='Next unit →';btn.onclick=()=>{renderDash();openUnit(nextU);};}
  else{btn.textContent='Back to dashboard';btn.onclick=()=>goTo('s-dash');}

  renderDash();
  goTo('s-result');
  getAIFeedback(l,pct);
}

async function getAIFeedback(l,pct){
  const el=document.getElementById('res-ai');
  const typeDesc={read:'reading comprehension',listen:'listening and dialogue',grammar:'grammar study',fib:'fill-in-the-blank practice',quiz:'quiz'};
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:`A student at A2 Czech level completed a ${typeDesc[l.type]} lesson called "${l.title}" (unit: "${curUnit.title}"). Score/completion: ${pct}%. Write 2-3 sentences of encouraging, specific feedback. Mention one practical tip or cultural note about Czech related to this lesson's topic. Friendly tone, under 70 words.`}]})
    });
    const data=await res.json();
    el.textContent=data.content?.map(c=>c.text||'').join('')||'Well done! Keep going.';
  }catch(e){
    el.textContent=pct===100?'Excellent work! Your Czech is developing really well at A2 level. Keep practising every day!':'Good effort! Review any tricky parts and move on — consistent daily practice is the key to reaching B1.';
  }
}

load();
renderDash();
